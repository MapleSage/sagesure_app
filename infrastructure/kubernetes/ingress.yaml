apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sagesure-ingress
  namespace: sagesure-india
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # Frontend - serve at root
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sagesure-frontend
                port:
                  number: 80
          
          # Backend API - serve at /api
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: sagesure-backend
                port:
                  number: 80
